name: Release

on:
  push:
    tags: ['v*']

jobs:
  solidity-test:
    name: Solidity tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: solidity
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - run: forge install foundry-rs/forge-std@v1.16.1
      - run: forge build --sizes
      - run: forge test -vvv

  js-test:
    name: JavaScript tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: js
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: js/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build

  publish-js:
    name: Publish @vattelum/document-registry-js
    needs: [solidity-test, js-test]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: js
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: js/package-lock.json
      - run: npm ci
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-solidity:
    name: Publish @vattelum/document-registry
    needs: [solidity-test, js-test]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: solidity
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
